<!DOCTYPE html>
<html>
<head>
  <title>Product Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div id="navbar"></div>

<div class="container mt-4">
  <div class="row">

    <div class="col-md-6">
      <img id="productImage" class="img-fluid rounded">
    </div>

    <div class="col-md-6">
      <h2 id="productName"></h2>
      <h4>₹<span id="productPrice"></span></h4>
      <p id="productDesc"></p>

      <button class="btn btn-primary" onclick="addToCartFromPage()">Add to Cart</button>
    </div>

  </div>
</div>

<!--  JS -->
<script src="js/common.js"></script>
<script src="js/cart.js"></script>

<script>
  loadNavbar();

  const params = new URLSearchParams(window.location.search);

  // Get values safely
  let name = params.get("name") || "Product";
  let price = params.get("price") || 0;
  let image = params.get("image") || "";
  let desc = params.get("desc") || "No description available";

  // Set values
  document.getElementById("productName").innerText = name;
  document.getElementById("productPrice").innerText = price;
  document.getElementById("productImage").src = image;
  document.getElementById("productDesc").innerText = desc;

  // Add to cart from this page
  function addToCartFromPage() {
    addToCart(name, price, image);
  }
</script>

</body>
</html>
